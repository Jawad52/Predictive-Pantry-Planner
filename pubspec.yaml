name: predictive_pantry_planner
description: "AI-driven zero-waste kitchen assistant with on-device vision and LLM."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & DI
  flutter_bloc: ^9.0.0
  get_it: ^8.0.3
  injectable: ^2.5.0
  
  # Functional Programming & Immutability
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  equatable: ^2.0.7
  
  # UI & Media
  camera: ^0.11.1
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.5
  image: ^4.3.0
  
  # Data & Storage
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  
  # AI & ML
  google_mlkit_object_detection: ^0.13.0
  google_generative_ai: ^0.4.6
  
  # Networking
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  injectable_generator: ^2.6.2
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/labels.txt
